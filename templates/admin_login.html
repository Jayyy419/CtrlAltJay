<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CtrlAltJay Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-login-page">
  <main class="login-card">
    <h1>Admin Login</h1>
    <p>CtrlAltJay content manager</p>

    <form id="admin-login-form">
      <label>Passcode</label>
      <input type="password" id="admin-passcode" name="passcode" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
    <p id="login-feedback" style="color: #f87171; font-size: 0.85rem; margin-top: 0.5rem;"></p>

    <a href="{{ url_for('index') }}">Back to portfolio</a>
  </main>

  <script>
    document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const feedback = document.getElementById("login-feedback");
      const passcode = document.getElementById("admin-passcode").value.trim();
      if (!passcode) { feedback.textContent = "Passcode is required."; return; }
      feedback.textContent = "Verifying...";
      try {
        const res = await fetch("/admin/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ passcode }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect_url || "/admin";
        } else {
          feedback.textContent = data.error || "Authentication failed.";
        }
      } catch (_) {
        feedback.textContent = "Could not verify right now. Please try again.";
      }
    });
  </script>
</body>
</html>
